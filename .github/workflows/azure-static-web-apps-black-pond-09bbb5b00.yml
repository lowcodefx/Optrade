name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Set up Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_POND_09BBB5B00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/" # App source code path
          api_location: "api" # Api source code path - optional
          output_location: "dist" # Built app content directory - optional
          ###### End of Repository/Build Configurations ######
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_BACKEND_KEY: ${{ secrets.VITE_BACKEND_KEY }}

      - name: Deploy server to VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: NEWS_API_KEY
          script: |
            ~/deploy.sh
            if [ -n "$NEWS_API_KEY" ]; then
              ECO=~/optrade-api/ecosystem.config.js
              if grep -q 'NEWS_API_KEY' "$ECO"; then
                sed -i "s|NEWS_API_KEY:.*|NEWS_API_KEY: '${NEWS_API_KEY}',|" "$ECO"
              else
                sed -i "s|ANTHROPIC_API_KEY:|NEWS_API_KEY: '${NEWS_API_KEY}',\n        ANTHROPIC_API_KEY:|" "$ECO"
              fi
              pm2 delete optrade-api
              cd ~/optrade-api && pm2 start ecosystem.config.js
            fi

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_POND_09BBB5B00 }}
          action: "close"
